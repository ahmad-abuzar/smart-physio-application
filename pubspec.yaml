name: smart_physio
description: "AI-Based Muscle Pain Relief & Exercise Recommendation System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^1.2.0+3
  fl_chart: ^0.69.2
  lottie: ^3.3.1
  percent_indicator: ^4.2.3

  # Camera & ML
  camera: ^0.11.1
  google_mlkit_pose_detection: ^0.12.0
  permission_handler: ^11.3.1

  # Audio Feedback
  flutter_tts: ^4.2.0

  # Utils
  connectivity_plus: ^6.1.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21 # Required if your min_sdk is 21+
  web:
    generate: true
    image_path: "assets/icons/app_logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/icons/app_logo.png"
  macos:
    generate: true
    image_path: "assets/icons/app_logo.png"
  